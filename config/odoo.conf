[options]
; -------- Database --------
db_host = db
db_port = 5432
db_user = odoo
db_password = False
; db_password is read from env var (HOST/USER/PASSWORD) — keep False here.
db_maxconn = 64
db_template = template0

; -------- Workers (tune for server cores) --------
; Rule of thumb: workers = (2 * cpu) + 1
; Set http_port + longpolling_port match docker-compose port mapping.
workers = 5
max_cron_threads = 2
http_port = 8069
longpolling_port = 8072

; -------- Memory / time limits --------
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = 0

; -------- Addons paths --------
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; -------- Logging --------
logfile = False
log_level = info
log_handler = :INFO
syslog = False

; -------- Security --------
list_db = False
proxy_mode = True
admin_passwd = ${ODOO_ADMIN_PASSWD}

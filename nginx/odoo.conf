# /etc/nginx/sites-available/odoo.conf
# Replace ${ODOO_DOMAIN} with your real domain (use envsubst < odoo.conf.template).
# Copy / symlink to /etc/nginx/sites-enabled/ then `nginx -t && systemctl reload nginx`.

upstream odoo_http {
    server 127.0.0.1:8069;
}

upstream odoo_longpoll {
    server 127.0.0.1:8072;
}

# Redirect plain HTTP to HTTPS, EXCEPT /.well-known/ for certbot challenge.
server {
    listen 80;
    server_name ${ODOO_DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ${ODOO_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${ODOO_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${ODOO_DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # gzip — Odoo serves a lot of JSON
    gzip on;
    gzip_min_length 1100;
    gzip_proxied any;
    gzip_types text/plain text/xml text/css application/json application/javascript application/xml;

    # Proxy buffers — large reports can return multi-MB JSON
    proxy_buffers 16 64k;
    proxy_buffer_size 128k;

    # Forwarded headers — Odoo reads X-Forwarded-* when proxy_mode=True
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;

    # WebSocket route — Odoo longpolling on /websocket and /longpolling/
    location /websocket {
        proxy_pass http://odoo_longpoll;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 720s;
        proxy_send_timeout 720s;
    }

    location /longpolling/ {
        proxy_pass http://odoo_longpoll;
        proxy_read_timeout 720s;
    }

    # Static asset cache — Odoo serves /web/static/* with versioned URLs
    location ~* /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://odoo_http;
    }

    # Everything else → odoo http
    location / {
        proxy_pass http://odoo_http;
        proxy_read_timeout 720s;
    }

    client_max_body_size 100m;
}
